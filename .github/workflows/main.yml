name: Stock Monitor Bot

on:
  schedule:
    # - cron: '17 2 * * 1-5'  # 10:17 北京时间
    # - cron: '4 3 * * 1-5'   # 11:04 北京时间
    # - cron: '13 6 * * 1-5'  # 14:13 北京时间
    # - cron: '18 7 * * 1-5'  # 15:18 北京时间
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # 增加超时保护，防止请求阻塞
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip' # 自动缓存依赖，加快下次运行速度

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas baostock

    - name: 运行监控脚本
      env:
        WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # 如果脚本运行报错，GitHub 会发邮件通知你
      run: python stock_monitor.py
